<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Link Shopee</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f9;
    text-align:center;
    padding:50px 20px;
}

.container{
    max-width:500px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    margin:0 auto;
}

h1{
    color:#ee4d2d;
    font-size:24px;
    margin-bottom:20px;
}

input[type=text]{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#ee4d2d;
    color:#fff;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

button:hover{
    background:#d33b1c;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.result-box{
    margin-top:20px;
    display:none;
    background:#f9f9f9;
    padding:15px;
    border-radius:5px;
    border:1px dashed #ee4d2d;
}

.btn-copy{
    background:#0084ff;
}

.btn-copy:hover{
    background:#0066cc;
}

.btn-buy{
    display:block;
    width:100%;
    padding:12px;
    background:#42b72a;
    color:#fff;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    margin-top:10px;
    box-sizing:border-box;
}

.btn-buy:hover{
    background:#379d22;
}

.status-text{
    font-weight:bold;
    color:#333;
    margin-bottom:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Tạo Link Hoàn Tiền</h1>

<input
type="text"
id="shopeeLink"
placeholder="Nhập link sản phẩm Shopee..."
>
<input
    type="text"
    id="subId"
    placeholder="Nhập số Zalo..."
    style="margin-top:8px;"
>
<button
id="generateBtn"
onclick="generateAffLink()">
Tạo Link Ngay
</button>

<div
class="result-box"
id="resultBox">

<p
class="status-text"
id="statusText">
⏳ Đang xử lý...
</p>

<input
type="hidden"
id="outputLink">

<button
id="copyBtn"
class="btn-copy"
onclick="copyToClipboard()"
disabled>
Đang xử lý...
</button>

<a
id="buyBtn"
class="btn-buy"
href="#"
target="_blank"
style="display:none;">
🛒 Mua ngay
</a>

</div>

</div>

<script>

let isLoading=false;
let buyLink="";

async function generateAffLink(){

    if(isLoading) return;

    let inputLink=document.getElementById("shopeeLink").value.trim();
    let subId=document.getElementById("subId").value.trim();

if(subId===""){
    subId="caback";      // Sub ID mặc định
}

    if(!inputLink){
        alert("Vui lòng nhập link Shopee");
        return;
    }

    if(!inputLink.startsWith("http")){
        inputLink="https://"+inputLink;
    }

    isLoading=true;

    const btn=document.getElementById("generateBtn");
    const resultBox=document.getElementById("resultBox");
    const statusText=document.getElementById("statusText");
    const output=document.getElementById("outputLink");
    const copyBtn=document.getElementById("copyBtn");
    const buyBtn=document.getElementById("buyBtn");

    btn.disabled=true;
    btn.innerText="Đang xử lý...";

    resultBox.style.display="block";

    statusText.innerText="⏳ Đang xử lý link...";

    copyBtn.disabled=true;
    buyBtn.style.display="none";

    try{

       const res = await fetch(
    "https://customlink22.onedayofu01.workers.dev/",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
    url: inputLink,
    sub_id: subId
})
    }
);

const data = await res.json();

if (!data.success) {
    throw new Error(data.error);
}

// Nội dung để copy
output.value = data.data.copyText;

// Link nút Mua ngay
buyBtn.href = data.data.buyLink;
buyBtn.style.display = "block";

statusText.innerText = "✔ Link đã sẵn sàng";

copyBtn.disabled = false;
copyBtn.innerText = "📋 Sao chép";

    }catch(err){

        console.log(err);

        statusText.innerText="❌ Không xử lý được link";

    }

    isLoading=false;

    btn.disabled=false;
    btn.innerText="Tạo Link Ngay";

}

function copyToClipboard(){

    navigator.clipboard.writeText(
        document.getElementById("outputLink").value
    );

    alert("Đã sao chép!");

}

</script>

</body>
</html>
